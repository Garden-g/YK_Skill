name: "Rustic Wooden Stool Display"
description: "Product placed on a natural wood stool against a clean white background — artisan and minimal"
reference_image: "references/rustic-wooden-stool-display.png"
applicable_products:
  - "pillow"
  - "throw pillow"
  - "cushion"
  - "blanket"
  - "throw"
  - "shawl"
  - "tray"
  - "vase"
  - "candle"
  - "basket"
  - "storage basket"
  - "small decor"
  - "placemat"
  - "table runner"
applicable_scenes:
  - "product display"
  - "e-commerce"
  - "artisan brand"
  - "handmade product"
  - "home decor catalog"
  - "Etsy listing"
  - "craft product photography"
style: "rustic, natural, artisan, clean, handcrafted, minimalist"
variables:
  - name: "stool_style"
    description: "Style of the wooden stool or stand"
    default: "a small natural light oak stool with tapered legs, showing wood grain texture"
  - name: "background"
    description: "Background behind the product and stool"
    default: "pure clean white, seamless"
  - name: "lighting"
    description: "Lighting setup for the scene"
    default: "soft, even natural daylight from slightly above and in front, no harsh shadows"
  - name: "composition"
    description: "Camera angle and framing"
    default: "straight-on front view, product centered on stool, slightly below eye level"
prompt_template: |
  A professional product photograph of {{product_description}}, placed on top of {{stool_style}}. The background is {{background}}. Lighting: {{lighting}}. The composition is {{composition}}. The product is the clear hero of the image — the wooden stool serves as a simple, elegant display platform that adds natural warmth without competing with the product. The overall mood is clean, artisan, and authentic. Shot with a professional camera, 85mm lens, sharp focus on the product with clean edges. High-end product photography, 8K resolution, photorealistic.
edit_prompt_template: |
  Replace the product on the wooden stool with {{product_description}}. Keep the exact same wooden stool, background, lighting, and composition from the reference image. The new product should sit naturally on top of the stool, properly sized and realistically placed. Maintain the clean, artisan aesthetic. Photorealistic result.
